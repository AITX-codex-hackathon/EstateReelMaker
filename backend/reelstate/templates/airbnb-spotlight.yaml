template_id: airbnb-spotlight
name: Airbnb Spotlight
description: >
  45-second lifestyle-led reel for short-term rentals. Vibe over architecture.
  Emphasizes amenities, comfort, "you'll feel at home" energy.
author: AutoHDR
version: "1.0.0"

target_duration_sec: 45.0
aspect_ratio: "9:16"
pacing_mode: bar

global_color_grade: warm_lifestyle

draft_resolution_p: 540
final_resolution_p: 1080
draft_crf: 28
final_crf: 20

shot_slots:
  - slot_id: vibe_exterior
    description: Inviting exterior — porch lights on, welcoming
    room_type: exterior
    duration_sec: 3.5
    motion: slow_zoom_in
    motion_strength: 0.4
    transition_in: fade
    text_overlay_id: location_tag

  - slot_id: living_vibe
    description: Living room — cozy, soft lights, throw blanket energy
    room_type: living_room
    duration_sec: 3.5
    motion: pan_right
    motion_strength: 0.4
    transition_in: dissolve

  - slot_id: kitchen_vibe
    description: Kitchen — coffee setup visible, breakfast bar
    room_type: kitchen
    duration_sec: 3.0
    motion: slow_zoom_in
    motion_strength: 0.5
    transition_in: cut

  - slot_id: coffee_detail
    description: Coffee / espresso / french press detail
    room_type: detail
    duration_sec: 1.8
    motion: slow_zoom_in
    motion_strength: 0.7
    transition_in: cut
    fallback_to_generated: true
    generation_prompt: >
      Cozy morning coffee scene on kitchen counter, warm light, steam rising,
      lifestyle photography, shallow depth of field

  - slot_id: bedroom_main
    description: Main bedroom — made bed, soft pillows, calm
    room_type: bedroom
    duration_sec: 3.5
    motion: slow_zoom_out
    motion_strength: 0.3
    transition_in: dissolve

  - slot_id: bedroom_extra
    description: Second bedroom or bunk room
    room_type: bedroom
    duration_sec: 2.5
    motion: pan_right
    motion_strength: 0.4
    transition_in: cut
    must_fill: false

  - slot_id: bathroom
    description: Spa-feel bathroom
    room_type: bathroom
    duration_sec: 2.5
    motion: slow_zoom_in
    motion_strength: 0.4
    transition_in: cut

  - slot_id: outdoor_lounge
    description: Outdoor lounge / fire pit / hammock
    room_type: backyard
    duration_sec: 3.5
    motion: pan_right
    motion_strength: 0.4
    transition_in: dissolve

  - slot_id: amenity_hot_tub
    description: Hot tub or pool, hero amenity for STR
    room_type: amenity
    duration_sec: 3.5
    motion: slow_zoom_in
    motion_strength: 0.4
    transition_in: dissolve
    must_fill: false

  - slot_id: view
    description: View from property — mountain, ocean, city
    room_type: view
    duration_sec: 3.5
    motion: pan_right
    motion_strength: 0.3
    transition_in: dissolve
    must_fill: false

  - slot_id: lifestyle_close
    description: Lifestyle close — cocktail, book, vinyl, candles
    room_type: lifestyle
    duration_sec: 2.5
    motion: slow_zoom_in
    motion_strength: 0.6
    transition_in: cut
    fallback_to_generated: true
    generation_prompt: >
      Cozy evening lifestyle close-up — wine glass, open book, candle, warm lamp light

  - slot_id: cta
    description: Closing exterior at twilight with booking CTA
    room_type: exterior
    duration_sec: 4.0
    motion: pull_out
    motion_strength: 0.4
    transition_in: dissolve
    text_overlay_id: cta_overlay

audio_cues:
  - track_query: "mood:vibey tempo:medium"
    kind: music
    start_time_sec: 0.0
    end_time_sec: null
    volume_db: -3.0
    fade_in_sec: 1.0
    fade_out_sec: 2.0

text_overlays:
  - overlay_id: location_tag
    text_template: "{{ property.address }}"
    position: top_left
    font_size_px: 44
    color_hex: "#FFFFFF"
    background_hex: "#00000066"
    duration_sec: 3.5

  - overlay_id: cta_overlay
    text_template: "BOOK YOUR STAY\n{{ property.address }}"
    position: center
    font_size_px: 56
    color_hex: "#FFFFFF"
    background_hex: "#7B2CBFCC"
    duration_sec: 4.0
    fade_in_sec: 0.5
    fade_out_sec: 0.5
