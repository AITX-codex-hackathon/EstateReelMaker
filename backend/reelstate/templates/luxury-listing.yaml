template_id: luxury-listing
name: Luxury Listing
description: >
  Slow, cinematic 60-second walkthrough for high-end properties.
  Emphasizes architecture, light, and craftsmanship. Mood: aspirational, timeless.
author: AutoHDR
version: "1.0.0"

target_duration_sec: 60.0
aspect_ratio: "9:16"
pacing_mode: free

global_color_grade: warm_cinematic

draft_resolution_p: 540
final_resolution_p: 1080
draft_crf: 28
final_crf: 18

shot_slots:
  - slot_id: hero_exterior
    description: Wide establishing shot of the property exterior, ideally golden hour or twilight
    room_type: exterior
    duration_sec: 5.0
    motion: slow_zoom_in
    motion_strength: 0.3
    transition_in: fade
    text_overlay_id: address_card
    fallback_to_generated: true
    generation_prompt: >
      Cinematic wide-angle exterior of a luxury home at golden hour, dramatic sky,
      lush landscaping, warm window glow, architectural photography, ultra detailed

  - slot_id: foyer
    description: Entry foyer or grand entrance — symmetry, scale, materials
    room_type: foyer
    duration_sec: 3.5
    motion: push_in
    motion_strength: 0.4
    transition_in: dissolve

  - slot_id: kitchen_wide
    description: Wide kitchen shot showing island, appliances, finishes
    room_type: kitchen
    duration_sec: 4.0
    motion: pan_right
    motion_strength: 0.4
    transition_in: dissolve

  - slot_id: kitchen_detail
    description: Detail shot — faucet, marble, hardware, espresso machine
    room_type: kitchen
    duration_sec: 2.5
    motion: slow_zoom_in
    motion_strength: 0.5
    transition_in: cut

  - slot_id: living_room
    description: Living room wide showing fireplace, ceiling height, view
    room_type: living_room
    duration_sec: 4.5
    motion: slow_zoom_out
    motion_strength: 0.3
    transition_in: dissolve

  - slot_id: dining
    description: Dining area, ideally with natural light through tall windows
    room_type: living_room
    duration_sec: 3.0
    motion: pan_left
    motion_strength: 0.3
    transition_in: cut
    must_fill: false

  - slot_id: primary_bedroom
    description: Primary bedroom — wide, calm, soft light
    room_type: bedroom
    duration_sec: 4.0
    motion: slow_zoom_in
    motion_strength: 0.3
    transition_in: dissolve
    text_overlay_id: feature_beds

  - slot_id: primary_bath
    description: Primary bathroom — soaking tub, double vanity, finishes
    room_type: bathroom
    duration_sec: 3.5
    motion: pan_right
    motion_strength: 0.3
    transition_in: cut
    text_overlay_id: feature_baths

  - slot_id: detail_close
    description: Detail close-up — texture, art, books, plants, anything that adds soul
    room_type: detail
    duration_sec: 2.0
    motion: slow_zoom_in
    motion_strength: 0.6
    transition_in: cut

  - slot_id: backyard
    description: Backyard, pool, or outdoor living
    room_type: backyard
    duration_sec: 4.5
    motion: pan_right
    motion_strength: 0.3
    transition_in: dissolve

  - slot_id: view_or_amenity
    description: Hero amenity — view, gym, wine cellar, theater
    room_type: view
    duration_sec: 4.0
    motion: slow_zoom_out
    motion_strength: 0.3
    transition_in: dissolve
    must_fill: false

  - slot_id: closing_exterior
    description: Closing shot — exterior at night with lights on, or aerial twilight
    room_type: exterior
    duration_sec: 5.0
    motion: pull_out
    motion_strength: 0.4
    transition_in: dissolve
    text_overlay_id: price_card
    fallback_to_generated: true
    generation_prompt: >
      Cinematic exterior of luxury home at twilight blue hour, every window glowing warmly,
      perfectly manicured, slight aerial angle, magazine-quality

audio_cues:
  - track_query: "mood:cinematic tempo:slow"
    kind: music
    start_time_sec: 0.0
    end_time_sec: null
    volume_db: -3.0
    fade_in_sec: 1.5
    fade_out_sec: 2.5

text_overlays:
  - overlay_id: address_card
    text_template: "{{ property.address }}"
    position: bottom_left
    font_family: Inter
    font_size_px: 56
    color_hex: "#FFFFFF"
    background_hex: "#00000066"
    duration_sec: 4.0
    fade_in_sec: 0.5
    fade_out_sec: 0.5

  - overlay_id: feature_beds
    text_template: "{{ property.beds }} BEDS  ·  {{ property.baths }} BATHS  ·  {{ property.sqft }} sqft"
    position: bottom_left
    font_size_px: 40
    color_hex: "#FFFFFF"
    background_hex: "#00000066"
    duration_sec: 3.0

  - overlay_id: feature_baths
    text_template: "{{ property.beds }} BEDS  ·  {{ property.baths }} BATHS  ·  {{ property.sqft }} sqft"
    position: bottom_left
    font_size_px: 40
    color_hex: "#FFFFFF"
    background_hex: "#00000066"
    duration_sec: 3.0

  - overlay_id: price_card
    text_template: "{{ property.price }}"
    position: center
    font_size_px: 72
    color_hex: "#FFFFFF"
    background_hex: "#00000099"
    duration_sec: 4.0
    fade_in_sec: 0.8
    fade_out_sec: 0.8
