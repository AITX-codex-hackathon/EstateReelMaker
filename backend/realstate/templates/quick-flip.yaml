template_id: quick-flip
name: Quick Flip
description: >
  Fast 30-second beat-synced reel for entry-level listings or social-first content.
  Energy: punchy, modern, scroll-stopping.
author: AutoHDR
version: "1.0.0"

target_duration_sec: 30.0
aspect_ratio: "9:16"
pacing_mode: beat

global_color_grade: cool_modern

draft_resolution_p: 540
final_resolution_p: 1080
draft_crf: 28
final_crf: 20

shot_slots:
  - slot_id: hook_exterior
    description: Punchy exterior hook
    room_type: exterior
    duration_sec: 1.5
    motion: push_in
    motion_strength: 0.7
    transition_in: cut
    text_overlay_id: hook_text

  - slot_id: foyer
    description: Quick foyer flash
    room_type: foyer
    duration_sec: 1.2
    motion: push_in
    motion_strength: 0.6
    transition_in: whip_pan

  - slot_id: kitchen
    description: Kitchen wide
    room_type: kitchen
    duration_sec: 1.8
    motion: pan_right
    motion_strength: 0.7
    transition_in: cut

  - slot_id: living
    description: Living room
    room_type: living_room
    duration_sec: 1.5
    motion: slow_zoom_in
    motion_strength: 0.6
    transition_in: cut

  - slot_id: bed_1
    description: First bedroom
    room_type: bedroom
    duration_sec: 1.2
    motion: pan_right
    motion_strength: 0.6
    transition_in: cut

  - slot_id: bed_2
    description: Second bedroom
    room_type: bedroom
    duration_sec: 1.2
    motion: pan_left
    motion_strength: 0.6
    transition_in: cut
    must_fill: false

  - slot_id: bath
    description: Bathroom
    room_type: bathroom
    duration_sec: 1.2
    motion: slow_zoom_in
    motion_strength: 0.5
    transition_in: cut

  - slot_id: outdoor
    description: Outdoor or deck
    room_type: backyard
    duration_sec: 1.5
    motion: pan_right
    motion_strength: 0.6
    transition_in: cut

  - slot_id: detail_a
    description: Detail beat 1
    room_type: detail
    duration_sec: 0.8
    motion: slow_zoom_in
    motion_strength: 0.8
    transition_in: cut

  - slot_id: detail_b
    description: Detail beat 2
    room_type: detail
    duration_sec: 0.8
    motion: slow_zoom_out
    motion_strength: 0.8
    transition_in: cut

  - slot_id: detail_c
    description: Detail beat 3
    room_type: detail
    duration_sec: 0.8
    motion: pan_right
    motion_strength: 0.8
    transition_in: cut

  - slot_id: cta_exterior
    description: Closing exterior with CTA
    room_type: exterior
    duration_sec: 4.0
    motion: pull_out
    motion_strength: 0.5
    transition_in: dissolve
    text_overlay_id: cta_text

audio_cues:
  - track_query: "mood:upbeat tempo:fast"
    kind: music
    start_time_sec: 0.0
    end_time_sec: null
    volume_db: -2.0
    fade_in_sec: 0.3
    fade_out_sec: 1.5

text_overlays:
  - overlay_id: hook_text
    text_template: "JUST LISTED"
    position: center
    font_size_px: 88
    color_hex: "#FFFFFF"
    background_hex: "#FF1493CC"
    duration_sec: 1.5
    fade_in_sec: 0.1
    fade_out_sec: 0.2

  - overlay_id: cta_text
    text_template: "{{ property.price }}  ·  DM TO TOUR"
    position: center
    font_size_px: 64
    color_hex: "#FFFFFF"
    background_hex: "#7B2CBFCC"
    duration_sec: 4.0
    fade_in_sec: 0.3
    fade_out_sec: 0.5
