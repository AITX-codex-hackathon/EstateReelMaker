template_id: cinematic-walkthrough
name: Cinematic Walkthrough
description: >
  75-second narrative arc — establish, explore, reveal, close.
  Includes optional voiceover slot and feature reveal beats.
author: AutoHDR
version: "1.0.0"

target_duration_sec: 75.0
aspect_ratio: "9:16"
pacing_mode: free

global_color_grade: warm_cinematic

draft_resolution_p: 540
final_resolution_p: 1080
draft_crf: 26
final_crf: 18

shot_slots:
  # ACT 1 — establish (0-15s)
  - slot_id: establish_aerial
    description: Aerial or wide establishing — neighborhood / approach
    room_type: exterior
    duration_sec: 4.5
    motion: slow_zoom_in
    motion_strength: 0.3
    transition_in: fade
    fallback_to_generated: true
    generation_prompt: >
      Aerial drone shot approaching luxury home, neighborhood context, magic hour

  - slot_id: exterior_detail
    description: Exterior architectural detail — door, facade material, address number
    room_type: exterior
    duration_sec: 2.5
    motion: slow_zoom_in
    motion_strength: 0.5
    transition_in: cut

  - slot_id: hero_exterior
    description: Hero exterior wide
    room_type: exterior
    duration_sec: 4.0
    motion: pan_right
    motion_strength: 0.3
    transition_in: dissolve
    text_overlay_id: address_card

  - slot_id: foyer_reveal
    description: Foyer / entry reveal — push through doorway feel
    room_type: foyer
    duration_sec: 4.0
    motion: push_in
    motion_strength: 0.5
    transition_in: dissolve

  # ACT 2 — explore (15-50s)
  - slot_id: living_wide
    description: Living room wide
    room_type: living_room
    duration_sec: 4.0
    motion: pan_right
    motion_strength: 0.3
    transition_in: dissolve

  - slot_id: living_detail
    description: Living room detail — fireplace, art, bookshelf
    room_type: detail
    duration_sec: 2.5
    motion: slow_zoom_in
    motion_strength: 0.5
    transition_in: cut

  - slot_id: kitchen_wide
    description: Kitchen wide
    room_type: kitchen
    duration_sec: 4.0
    motion: pan_left
    motion_strength: 0.3
    transition_in: dissolve

  - slot_id: kitchen_detail
    description: Kitchen detail
    room_type: kitchen
    duration_sec: 2.5
    motion: slow_zoom_in
    motion_strength: 0.6
    transition_in: cut
    text_overlay_id: feature_card

  - slot_id: dining
    description: Dining area
    room_type: living_room
    duration_sec: 3.0
    motion: pan_right
    motion_strength: 0.3
    transition_in: cut
    must_fill: false

  - slot_id: primary_bedroom
    description: Primary bedroom
    room_type: bedroom
    duration_sec: 4.0
    motion: slow_zoom_in
    motion_strength: 0.3
    transition_in: dissolve

  - slot_id: primary_bath
    description: Primary bath
    room_type: bathroom
    duration_sec: 3.0
    motion: pan_right
    motion_strength: 0.3
    transition_in: cut

  # ACT 3 — reveal (50-65s)
  - slot_id: outdoor_wide
    description: Outdoor wide — pool, yard, deck
    room_type: backyard
    duration_sec: 4.5
    motion: slow_zoom_out
    motion_strength: 0.3
    transition_in: dissolve

  - slot_id: outdoor_detail
    description: Outdoor detail — fire pit, pool tile, plants
    room_type: detail
    duration_sec: 2.5
    motion: pan_right
    motion_strength: 0.5
    transition_in: cut

  - slot_id: amenity
    description: Hero amenity — view, gym, theater, wine cellar
    room_type: view
    duration_sec: 3.5
    motion: slow_zoom_in
    motion_strength: 0.4
    transition_in: dissolve
    must_fill: false

  # ACT 4 — close (65-75s)
  - slot_id: lifestyle
    description: Lifestyle moment — golden hour view, sunset, candle light
    room_type: lifestyle
    duration_sec: 4.0
    motion: slow_zoom_in
    motion_strength: 0.4
    transition_in: dissolve
    fallback_to_generated: true
    generation_prompt: >
      Lifestyle shot, golden hour interior with warm sun streaming through windows,
      relaxed homey feel, no people visible

  - slot_id: closing_card
    description: Closing exterior with price
    room_type: exterior
    duration_sec: 4.5
    motion: pull_out
    motion_strength: 0.4
    transition_in: dissolve
    text_overlay_id: closing_card

audio_cues:
  - track_query: "mood:cinematic tempo:slow"
    kind: music
    start_time_sec: 0.0
    end_time_sec: null
    volume_db: -4.0
    fade_in_sec: 2.0
    fade_out_sec: 3.0

  # Voiceover slot — optional, fires only if user enables it
  - track_query: "gen:Calm warm narrator describing the property"
    kind: voiceover
    start_time_sec: 4.0
    end_time_sec: 60.0
    volume_db: 0.0
    fade_in_sec: 0.3
    fade_out_sec: 0.5

text_overlays:
  - overlay_id: address_card
    text_template: "{{ property.address }}"
    position: bottom_left
    font_size_px: 52
    color_hex: "#FFFFFF"
    background_hex: "#00000066"
    duration_sec: 4.0

  - overlay_id: feature_card
    text_template: "{{ property.beds }} bd · {{ property.baths }} ba · {{ property.sqft }} sqft"
    position: bottom_left
    font_size_px: 40
    color_hex: "#FFFFFF"
    background_hex: "#00000066"
    duration_sec: 3.0

  - overlay_id: closing_card
    text_template: "{{ property.price }}\n{{ property.address }}"
    position: center
    font_size_px: 60
    color_hex: "#FFFFFF"
    background_hex: "#00000099"
    duration_sec: 4.5
